stages:
  - format
  - lint
  - typecheck
  - test

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - when: never

variables:
  UV_VERSION: "0.9"
  PYTHON_VERSION: "3.13"
  BASE_LAYER: bookworm-slim
  UV_LINK_MODE: copy
  UV_CACHE_DIR: .uv-cache
  UV_SYSTEM_PYTHON: 1

default:
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
  before_script:
    - apt-get update
    - apt-get install -y gcc make git
    - make setup-CI

  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR
    policy: pull-push

format:
  stage: format
  script:
    - uv run ruff format --check

lint:
  stage: lint
  script:
    - uv run ruff check --output-format=gitlab > code-quality-report.json || true
    - uv run ruff check
  artifacts:
    reports:
      codequality: $CI_PROJECT_DIR/code-quality-report.json

typecheck:
  stage: typecheck
  script:
    - uv run pyrefly check

test:
  stage: test
  script:
    - uv run pytest -q