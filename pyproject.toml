[project]
name = "image-processing"
version = "0.0.1"
description = "A modular pipeline for image processing to be used in ComfyUI"
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[dependency-groups]
dev = [
    "black>=26.1.0",
    "pyrefly>=0.52.0",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyrefly]
# files or directories to exclude from type checking
project-excludes = [
    "external/*",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]